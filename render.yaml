# קונפיגורציית פריסה ל-Render (Blueprint).
# כש-Render מחובר לריפו הזה הוא קורא את הקובץ ומגדיר הכול אוטומטית.
services:
  - type: web
    name: michael-king
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    # --timeout 240: ניתוח שיר דרך Klangio יכול לקחת יותר מ-30 שניות (ברירת המחדל),
    # ובלי זה ה-worker נהרג באמצע. --workers 2 שומר על האפליקציה זמינה בזמן ניתוח.
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 240 --workers 2
    envVars:
      - key: KLANGIO_API_KEY   # ממלאים בלוח הבקרה של Render (נשאר סודי)
        sync: false
      - key: KLANGIO_MODEL
        value: piano
